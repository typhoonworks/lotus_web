services:
  adminer:
    image: adminer
    restart: always
    container_name: lotus_web_adminer
    ports:
      - 8087:8080

  db:
    image: postgres:15.8
    restart: always
    container_name: lotus_web_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "2346:5432"
    volumes:
      - db:/var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    restart: always
    container_name: lotus_web_mysql
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: lotus_web_dev
      MYSQL_USER: lotus
      MYSQL_PASSWORD: lotus
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    restart: always
    container_name: lotus_web_clickhouse
    ports:
      - "9123:8123"
      - "9100:9000"
    environment:
      CLICKHOUSE_DB: lotus_web_dev
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  db:
  mysql_data:
  clickhouse_data: